name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Test
        run: bun test

      - name: Build frontend
        run: bun run build:front
        env:
          VITE_APP_BASE_URL: ${{ secrets.VITE_APP_BASE_URL }}

      - name: Generate wrangler.jsonc
        run: |
          cp backend/wrangler.example.jsonc backend/wrangler.jsonc
          sed -i "s/YOUR_DATABASE_NAME/${{ secrets.CLOUDFLARE_D1_DATABASES_NAME }}/g" backend/wrangler.jsonc
          sed -i "s/YOUR_DATABASE_ID/${{ secrets.CLOUDFLARE_DATABASE_ID }}/g" backend/wrangler.jsonc

      - name: Deploy to Cloudflare
        run: bunx wrangler deploy --config backend/wrangler.jsonc --x-autoconfig false
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
