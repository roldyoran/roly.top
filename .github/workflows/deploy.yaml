name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Test
        run: bun test

  build-frontend:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set environment variables
        run: |
          echo "VITE_APP_BASE_URL=${{ secrets.VITE_APP_BASE_URL }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build:front

  deploy:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Set environment variables
        run: |
          echo "DEV_MODE=${{ secrets.DEV_MODE }}" >> $GITHUB_ENV
          echo "CLOUDFLARE_D1_DATABASES_BINDING=${{ secrets.CLOUDFLARE_D1_DATABASES_BINDING }}" >> $GITHUB_ENV
          echo "CLOUDFLARE_D1_DATABASES_NAME=${{ secrets.CLOUDFLARE_D1_DATABASES_NAME }}" >> $GITHUB_ENV
          echo "SERVICE_ADMIN_API_KEY=${{ secrets.SERVICE_ADMIN_API_KEY }}" >> $GITHUB_ENV
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" >> $GITHUB_ENV
          echo "CLOUDFLARE_DATABASE_ID=${{ secrets.CLOUDFLARE_DATABASE_ID }}" >> $GITHUB_ENV
          echo "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}" >> $GITHUB_ENV
          echo "BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}" >> $GITHUB_ENV
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> $GITHUB_ENV

      - name: Deploy app
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: deploy
