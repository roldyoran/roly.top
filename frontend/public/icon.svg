<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-labelledby="roly-title roly-desc">
  <title id="roly-title">roly.top</title>
  <desc id="roly-desc">Logotipo de la letra R fusionada con un nodo de conexión web, trazo monoline continuo</desc>

  <g fill="none" stroke="#65a30d" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">

    <!-- 1. Asta vertical de la R -->
    <path d="M 64,150 L 64,50"/>

    <!-- 2. Bucle superior, dejado deliberadamente abierto -->
    <path d="
      M 64,50
      L 102,50
      C 124,50 138,62 138,80
      C 138,96 127,107 108,109
    "/>

    <!-- 3. Pierna diagonal de la R, dirigiéndose hacia el nodo -->
    <path d="M 80,107 L 118,150"/>

  </g>

  <!-- 4. Nodo terminal: punto de destino / endpoint de red -->
  <circle cx="118" cy="150" r="13" fill="#65a30d"/>

</svg>
